# Template config — copy to research-pipeline/models.toml and edit the URLs
# to point at your endpoints. All roles default to one local vLLM (chat) plus
# one local Ollama (embeddings); split by role (e.g. judge -> a stronger
# model, embedding -> a different host) by editing the relevant section.

[roles.planner]
backend = "openai-compatible"
base_url = "http://localhost:9999/v1"
api_key_env = "LLM_API_KEY"       # any string works; vLLM accepts sk-noop
model = "google/gemma-4-26B-A4B-it"

[roles.judge]
backend = "openai-compatible"
base_url = "http://localhost:9999/v1"
api_key_env = "LLM_API_KEY"
model = "google/gemma-4-26B-A4B-it"

[roles.agent_bulk]
backend = "openai-compatible"
base_url = "http://localhost:9999/v1"
api_key_env = "LLM_API_KEY"
model = "google/gemma-4-26B-A4B-it"

[roles.agent_heavy]
backend = "openai-compatible"
base_url = "http://localhost:9999/v1"
api_key_env = "LLM_API_KEY"
model = "google/gemma-4-26B-A4B-it"

[roles.embedding]
backend = "openai-compatible"
base_url = "http://localhost:11434/v1"
api_key_env = "LLM_API_KEY"              # any string works for Ollama
model = "qwen3-embedding:0.6b"           # 1024-dim
