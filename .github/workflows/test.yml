name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies (sim + ingest + dev extras)
        run: uv sync --extra sim --extra ingest --extra dev

      - name: Run fast pytest suite
        # Heavy LLM-driven integration tests are skipped in CI; they take 30+
        # minutes each and require a live LLM endpoint. Run them locally
        # before merging changes that touch the benchmark code.
        run: |
          uv run python -m pytest tests/ -q \
            --ignore=tests/test_simulation.py \
            --ignore=tests/test_optimize.py \
            --ignore=tests/test_e7_xl_conversational.py \
            --ignore=tests/test_e8_differential_state.py \
            --ignore=tests/test_e9_cross_thread_routing.py \
            --ignore=tests/test_e10_scale_out.py \
            --ignore=tests/test_e10_xl_scale_out.py \
            --ignore=tests/test_e11_uncertainty.py \
            --ignore=tests/test_e11b_open_world_state.py
